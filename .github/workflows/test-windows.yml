name: Test Windows
on:
  workflow_call:
jobs:
  test:
    strategy:
      matrix:
        go: [ "1.25", "1.26" ]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}
      - name: Install dependencies
        run: go mod tidy
      - name: Run tests
        run: go test -timeout 10m -run "^TestMainTestSuite$"